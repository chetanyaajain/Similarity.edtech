services:
  - type: web
    name: iteanary-ai-ml
    runtime: python
    rootDir: ml
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.13

  - type: web
    name: iteanary-ai-api
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.13
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: AI Assignment Similarity Checker API
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: iteanary-ai-db
          property: connectionString
      - key: ML_SERVICE_URL
        fromService:
          name: iteanary-ai-ml
          type: web
          property: hostport
      - key: CLIENT_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: REPORT_DIR
        value: reports

databases:
  - name: iteanary-ai-db
    databaseName: similarity_checker
    user: similarity_checker
    plan: starter

